<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Access</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#3d241f;
    --ink-dim:#8a5f56;
    --glass-bg: rgba(255,255,255,0.34);
    --glass-bg-soft: rgba(255,255,255,0.16);
    --glass-border: rgba(255,255,255,0.65);
    --glow-cyan:#ff8a65;
    --glow-violet:#ff6f91;
    --accent:#ff6f61;
    --error-red:#e0403f;
    --comic-yellow:#ffe14d;
    --peach-1:#ffe9d6;
    --peach-2:#ffcbb0;
    --peach-3:#ffb4b0;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    background: linear-gradient(160deg, var(--peach-1) 0%, var(--peach-2) 55%, var(--peach-3) 100%);
    font-family:'Space Grotesk', sans-serif;
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
  }

  /* ---------- Spline 3D panel (left side) ---------- */
  .scene-wrap{
    position:fixed;
    top:0;
    left:0;
    height:100dvh;
    width:56%;
    z-index:0;
  }
  .scene-wrap canvas{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
  }

  /* soft glow shapes to blend the 3D panel into the peach background */
  .bg-blobs{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
      radial-gradient(circle at 78% 15%, rgba(255,255,255,0.45), rgba(255,255,255,0) 40%),
      radial-gradient(circle at 85% 85%, rgba(255,180,176,0.5), rgba(255,180,176,0) 45%),
      radial-gradient(ellipse 60% 100% at 0% 50%, rgba(255,255,255,0.25), rgba(255,255,255,0) 60%);
  }

  /* soft edge fade where the 3D panel meets the peach background */
  .scene-fade{
    position:fixed;
    top:0;
    left:0;
    height:100dvh;
    width:56%;
    z-index:1;
    pointer-events:none;
    background: linear-gradient(90deg, rgba(255,233,214,0) 78%, rgba(255,233,214,0.9) 100%);
  }

  /* ---------- Layout ---------- */
  .stage{
    position:relative;
    z-index:2;
    min-height:100dvh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding: clamp(16px, 4vw, 56px);
    pointer-events:none;
  }
  .stage .glass-card{ pointer-events:auto; }

  /* ---------- Liquid glass card ---------- */
  .glass-card{
    position:relative;
    width:min(420px, 100%);
    padding: clamp(28px, 5vw, 44px) clamp(24px, 5vw, 40px);
    border-radius: 28px;
    background: linear-gradient(160deg, rgba(255,255,255,0.55), rgba(255,255,255,0.22) 45%, rgba(255,255,255,0.38));
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid var(--glass-border);
    box-shadow:
      0 14px 40px rgba(178,90,70,0.20),
      inset 0 1px 0 rgba(255,255,255,0.7),
      inset 0 -1px 12px rgba(255,255,255,0.15);
    overflow:hidden;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) both;
  }

  /* moving liquid sheen */
  .glass-card::before{
    content:"";
    position:absolute;
    top:-60%;
    left:-60%;
    width:220%;
    height:220%;
    background: conic-gradient(from 0deg, rgba(255,138,101,0.0), rgba(255,138,101,0.14), rgba(255,111,145,0.14), rgba(255,138,101,0.0) 60%);
    animation: swirl 14s linear infinite;
    pointer-events:none;
  }

  .glass-card::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:28px;
    padding:1px;
    background:linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0) 30%, rgba(255,255,255,0) 70%, rgba(255,255,255,0.4));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    pointer-events:none;
  }

  @keyframes swirl{
    to{ transform: rotate(360deg); }
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(24px) scale(.97); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .eyebrow{
    position:relative;
    z-index:1;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--glow-cyan);
    opacity:.85;
    margin:0 0 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--glow-cyan);
    box-shadow:0 0 8px var(--glow-cyan);
  }

  .title{
    position:relative;
    z-index:1;
    font-size: clamp(20px, 4.2vw, 25px);
    line-height:1.35;
    font-weight:600;
    margin: 0 0 6px;
    color: var(--ink);
  }

  .subtitle{
    position:relative;
    z-index:1;
    font-size:13.5px;
    color:var(--ink-dim);
    margin:0 0 26px;
  }

  form{
    position:relative;
    z-index:1;
  }

  .field-label{
    display:block;
    font-size:12px;
    color:var(--ink-dim);
    margin-bottom:8px;
    letter-spacing:.02em;
  }

  .input-wrap{
    position:relative;
    margin-bottom:22px;
  }

  input[type="text"]{
    width:100%;
    padding:15px 18px;
    font-size:15.5px;
    font-family:'Space Grotesk', sans-serif;
    color:var(--ink);
    background: rgba(255,255,255,0.4);
    border:1px solid rgba(255,255,255,0.55);
    border-radius:14px;
    outline:none;
    backdrop-filter: blur(6px);
    transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;
  }
  input[type="text"]::placeholder{
    color: rgba(138,95,86,0.55);
  }
  input[type="text"]:focus{
    border-color: var(--glow-cyan);
    background: rgba(255,255,255,0.6);
    box-shadow: 0 0 0 4px rgba(255,138,101,0.16), 0 0 18px rgba(255,138,101,0.25);
  }
  input[type="text"]:focus-visible{
    outline: 2px solid var(--glow-cyan);
    outline-offset: 2px;
  }

  .shake{
    animation: shakeField .45s ease;
    border-color: var(--error-red) !important;
    box-shadow: 0 0 0 4px rgba(255,59,87,0.18), 0 0 18px rgba(255,59,87,0.3) !important;
  }
  @keyframes shakeField{
    10%,90%{ transform: translateX(-1px); }
    20%,80%{ transform: translateX(2px); }
    30%,50%,70%{ transform: translateX(-5px); }
    40%,60%{ transform: translateX(5px); }
  }

  button.submit-btn{
    width:100%;
    padding:15px 18px;
    font-family:'Space Grotesk', sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:.02em;
    color:#fff;
    background: linear-gradient(135deg, var(--glow-cyan), #ff8fa3 55%, var(--glow-violet));
    border:none;
    border-radius:14px;
    cursor:pointer;
    box-shadow: 0 6px 24px rgba(255,111,97,0.30), inset 0 1px 0 rgba(255,255,255,0.5);
    transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  button.submit-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(255,111,97,0.40), inset 0 1px 0 rgba(255,255,255,0.5);
    filter: brightness(1.04);
  }
  button.submit-btn:active{
    transform: translateY(0px) scale(.98);
  }
  button.submit-btn:focus-visible{
    outline: 2px solid #fff;
    outline-offset: 3px;
  }
  button.submit-btn[disabled]{
    opacity:.7;
    cursor:progress;
  }

  .hint{
    position:relative;
    z-index:1;
    margin-top:18px;
    font-size:11.5px;
    text-align:center;
    color: rgba(138,95,86,0.6);
    letter-spacing:.01em;
  }

  /* ---------- Comic-style invalid answer popup ---------- */
  .comic-overlay{
    position:fixed;
    inset:0;
    z-index:50;
    display:none;
    align-items:center;
    justify-content:center;
    background: rgba(5,6,12,0.55);
    backdrop-filter: blur(3px);
    padding:20px;
  }
  .comic-overlay.show{
    display:flex;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }

  .burst{
    position:relative;
    width:min(360px, 92vw);
    filter: drop-shadow(0 12px 30px rgba(0,0,0,0.5));
    animation: popIn .38s cubic-bezier(.2,1.6,.4,1) both;
  }
  @keyframes popIn{
    0%{ transform: scale(.3) rotate(-8deg); opacity:0; }
    70%{ transform: scale(1.08) rotate(2deg); opacity:1; }
    100%{ transform: scale(1) rotate(-2deg); opacity:1; }
  }

  .burst svg{ width:100%; height:auto; display:block; }

  .burst-text{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 10% 18%;
    pointer-events:none;
  }
  .burst-text .big{
    font-family:'Bangers', cursive;
    font-size: clamp(30px, 8vw, 44px);
    letter-spacing:.03em;
    color:#1a0a05;
    -webkit-text-stroke: 1.5px #1a0a05;
    line-height:1;
    transform: rotate(-2deg);
  }
  .burst-text .small{
    font-family:'Bangers', cursive;
    font-size: clamp(13px, 3.2vw, 16px);
    color:#3a1406;
    margin-top:6px;
    letter-spacing:.02em;
    transform: rotate(-2deg);
  }

  .comic-dismiss{
    position:absolute;
    bottom: -6%;
    left:50%;
    transform: translateX(-50%);
    font-family:'Space Grotesk', sans-serif;
    font-size:12.5px;
    color:#fff;
    background: rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.3);
    padding:8px 18px;
    border-radius:999px;
    cursor:pointer;
    backdrop-filter: blur(8px);
  }
  .comic-dismiss:hover{ background: rgba(255,255,255,0.2); }

  /* ---------- Success flash ---------- */
  .success-flash{
    position:fixed;
    inset:0;
    z-index:60;
    background: radial-gradient(circle at 50% 50%, rgba(255,201,178,0.85), rgba(255,150,140,0.97) 70%);
    display:none;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#fff;
  }
  .success-flash.show{ display:flex; animation: fadeIn .2s ease; }
  .success-flash p{
    font-family:'JetBrains Mono', monospace;
    letter-spacing:.2em;
    text-transform:uppercase;
    font-size: clamp(13px, 3vw, 16px);
    color: #4a1f16;
  }

  /* ---------- Responsive tuning ---------- */
  @media (min-width: 1200px){
    .glass-card{ width: 460px; }
  }

  /* Tablet & phone: stack the 3D panel above the glass card instead of side-by-side */
  @media (max-width: 900px){
    html,body{ overflow-y:auto; }

    .scene-wrap{
      position:relative;
      width:100%;
      height:56dvh;
      top:auto;
      left:auto;
    }
    .scene-fade{
      width:100%;
      height:56dvh;
      background: linear-gradient(180deg, rgba(255,233,214,0) 78%, rgba(255,233,214,0.95) 100%);
    }
    .stage{
      min-height:44dvh;
      align-items:flex-start;
      justify-content:center;
      padding-top: clamp(20px, 4vh, 32px);
    }
  }

  @media (max-width: 480px){
    .glass-card{ border-radius:22px; }
    .scene-wrap, .scene-fade{ height:50dvh; }
    .stage{ min-height:50dvh; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>

  <div class="scene-wrap">
    <canvas id="canvas3d"></canvas>
  </div>
  <div class="scene-fade"></div>
  <div class="bg-blobs"></div>

  <div class="stage">
    <div class="glass-card" role="main">
      <p class="eyebrow"><span class="dot"></span> Access Gate</p>
      <h1 class="title">Prove you are Noshi💖</h1>
      <p class="subtitle">Answer the question below to step through.</p>

      <form id="gate-form" autocomplete="off">
        <label class="field-label" for="answer">What is your best friend's name?</label>
        <div class="input-wrap">
          <input type="text" id="answer" name="answer" placeholder="Type your answer…" required>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Unlock access</button>
      </form>

      <p class="hint">One correct name is all it takes.</p>
    </div>
  </div>

  <!-- Comic-style invalid answer popup -->
  <div class="comic-overlay" id="comic-overlay">
    <div class="burst">
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="burstGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffe14d"/>
            <stop offset="100%" stop-color="#ff9d3b"/>
          </linearGradient>
        </defs>
        <polygon fill="url(#burstGrad)" stroke="#1a0a05" stroke-width="4"
          points="150,4 172,55 220,28 218,82 270,78 245,124 296,150 245,176 270,222 218,218 220,272 172,245 150,296 128,245 80,272 82,218 30,222 55,176 4,150 55,124 30,78 82,82 80,28 128,55"/>
      </svg>
      <div class="burst-text">
        <div class="big">NOPE!</div>
        <div class="small">that's not the name!! Try again</div>
      </div>
      <button class="comic-dismiss" id="comic-dismiss">Try again</button>
    </div>
  </div>

  <!-- Success flash before redirect -->
  <div class="success-flash" id="success-flash">
    <p>Access granted — entering…</p>
  </div>

<script type="module">
  import { Application } from 'https://unpkg.com/@splinetool/runtime@1.12.98/build/runtime.js';

  const canvas = document.getElementById('canvas3d');
  const spline = new Application(canvas);

  // Name of the object in the Spline scene that should turn to face the cursor / tap.
  // (Named "Big" in the Spline Objects panel — the main character.)
  const TARGET_OBJECT_NAME = 'Big';
  const MAX_YAW = 0.45;   // radians, left/right turn limit
  const MAX_PITCH = 0.2;  // radians, up/down tilt limit
  const EASE = 0.08;      // smoothing factor per frame

  let character = null;
  let baseRotY = 0;
  let baseRotX = 0;
  let targetYaw = 0;
  let targetPitch = 0;

  spline.load('https://prod.spline.design/cZyy9P0A0ngtKOwm/scene.splinecode').then(() => {
    character = spline.findObjectByName(TARGET_OBJECT_NAME);
    if (character) {
      baseRotY = character.rotation.y;
      baseRotX = character.rotation.x;
    }
    animate();
  }).catch((err) => {
    console.error('Spline scene failed to load:', err);
  });

  function updateTargetFromPoint(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    const nx = ((clientX - rect.left) / rect.width) * 2 - 1;   // -1 (left) to 1 (right)
    const ny = ((clientY - rect.top) / rect.height) * 2 - 1;   // -1 (top) to 1 (bottom)
    targetYaw = Math.max(-1, Math.min(1, nx)) * MAX_YAW;
    targetPitch = Math.max(-1, Math.min(1, ny)) * MAX_PITCH;
  }

  // Desktop: follow the mouse anywhere on the page.
  window.addEventListener('pointermove', (e) => {
    updateTargetFromPoint(e.clientX, e.clientY);
  });

  // Mobile/tablet: face wherever the user taps or drags, anywhere on the page.
  window.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    if (t) updateTargetFromPoint(t.clientX, t.clientY);
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (t) updateTargetFromPoint(t.clientX, t.clientY);
  }, { passive: true });

  function animate(){
    if (character) {
      character.rotation.y += (baseRotY + targetYaw - character.rotation.y) * EASE;
      character.rotation.x += (baseRotX + targetPitch - character.rotation.x) * EASE;
    }
    requestAnimationFrame(animate);
  }
</script>

<script>
  const VALID_ANSWERS = ["candee", "candy"]; // case-insensitive match set
  const form = document.getElementById('gate-form');
  const input = document.getElementById('answer');
  const submitBtn = document.getElementById('submit-btn');
  const comicOverlay = document.getElementById('comic-overlay');
  const comicDismiss = document.getElementById('comic-dismiss');
  const successFlash = document.getElementById('success-flash');

  function normalize(str){
    return str.trim().toLowerCase();
  }

  function showComic(){
    comicOverlay.classList.add('show');
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 500);
  }

  function hideComic(){
    comicOverlay.classList.remove('show');
    input.value = "";
    input.focus();
  }

  comicDismiss.addEventListener('click', hideComic);
  comicOverlay.addEventListener('click', (e) => {
    if (e.target === comicOverlay) hideComic();
  });

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const val = normalize(input.value);

    if (VALID_ANSWERS.includes(val)) {
      submitBtn.disabled = true;
      submitBtn.textContent = "Unlocking…";
      successFlash.classList.add('show');
      
      // Set login flag in localStorage to trigger audio playback
      try {
        localStorage.setItem('userLoggedIn', 'true');
        sessionStorage.setItem('justLoggedIn', 'true');
        console.log('✅ Login flags set successfully');
      } catch (e) {
        console.error('LocalStorage error:', e);
      }
      
      setTimeout(() => {
        // Use location.href for better cross-browser compatibility
        window.location.href = "index.html";
      }, 900);
    } else {
      showComic();
    }
  });
</script>

</body>
</html>
